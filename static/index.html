<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ledger — job tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,500;0,6..96,600;0,6..96,700;1,6..96,500;1,6..96,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- AUTH VIEW -->
  <div id="auth-view" class="auth-view">
    <div class="auth-shell">
      <div class="auth-brand-panel">
        <div class="auth-brand-inner">
          <p class="auth-eyebrow">No. 001</p>
          <h1 class="brand-mark">Ledger</h1>
          <p class="auth-tagline">A running account of every<br>client, project, and task<br>you keep.</p>
          <div class="auth-rule"></div>
        </div>
      </div>

      <div class="auth-form-panel">
        <nav class="auth-tabs">
          <button id="tab-login" class="auth-tab active" type="button">Log in</button>
          <button id="tab-register" class="auth-tab" type="button">Register</button>
          <span class="auth-tab-indicator" id="auth-tab-indicator"></span>
        </nav>

        <form id="login-form" class="auth-form">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" required autocomplete="username" />
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required autocomplete="current-password" />
          <button type="submit" class="btn-primary">Log in</button>
          <p class="auth-error" id="login-error"></p>
        </form>

        <form id="register-form" class="auth-form hidden">
          <label for="register-username">Username</label>
          <input type="text" id="register-username" required autocomplete="username" />
          <label for="register-password">Password</label>
          <input type="password" id="register-password" required autocomplete="new-password" />
          <button type="submit" class="btn-primary">Create account</button>
          <p class="auth-error" id="register-error"></p>
        </form>
      </div>
    </div>
  </div>

  <!-- MAIN APP VIEW -->
  <div id="app-view" class="app-view hidden">

    <header class="topbar">
      <div class="topbar-left">
        <span class="brand-mark brand-mark--small">Ledger</span>
      </div>
      <div class="topbar-right">
        <span class="current-user" id="current-user"></span>
        <button id="logout-btn" class="btn-ghost">Log out</button>
      </div>
    </header>

    <main class="stack-wrap">
      <div class="stack-card">

        <div class="nav-bar">
          <button class="nav-back hidden" id="nav-back">
            <span class="nav-back-arrow">‹</span><span id="nav-back-label"></span>
          </button>
          <div class="nav-title-wrap">
            <p class="nav-eyebrow" id="nav-eyebrow">No. 01</p>
            <h2 class="nav-title" id="nav-title">Clients</h2>
          </div>
          <div class="nav-actions">
            <button class="btn-ghost btn-ghost-small hidden" id="access-btn">Manage access</button>
            <button class="btn-add" id="add-client-btn">+ New</button>
            <button class="btn-add hidden" id="add-project-btn">+ New</button>
            <button class="btn-add hidden" id="add-task-btn">+ New</button>
          </div>
        </div>

        <div class="stack-viewport">
          <section class="view" id="clients-column">
            <div class="list" id="clients-list"></div>
          </section>

          <section class="view" id="projects-column">
            <div class="list" id="projects-list"></div>
          </section>

          <section class="view" id="tasks-column">
            <div class="list" id="tasks-list"></div>
          </section>
        </div>

      </div>
    </main>
  </div>

  <!-- Modal for creating items -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal">
      <h3 id="modal-title">New item</h3>
      <form id="modal-form">
        <div id="modal-fields"></div>
        <div class="modal-actions">
          <button type="button" class="btn-ghost" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Manage access modal -->
  <div id="access-modal" class="modal-overlay hidden">
    <div class="modal">
      <h3>Manage access</h3>
      <div id="access-members-list" class="access-list"></div>

      <form id="access-invite-form" class="access-invite-form">
        <input type="text" id="access-invite-input" placeholder="Username to invite" required />
        <button type="submit" class="btn-primary">Add</button>
      </form>
      <p class="auth-error" id="access-error"></p>

      <div class="modal-actions">
        <button type="button" class="btn-ghost" id="access-close">Close</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
